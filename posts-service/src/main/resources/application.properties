spring.application.name=posts-service

server.servlet.context-path=/posts
server.port=8082

# Database connection properties
#no use of localhost docker container service name

spring.datasource.url=jdbc:postgresql://${DB_SERVICE:post-db}:5432/${DB_DATABASE:postservice}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}

# Hibernate properties (if using Spring Data JPA)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update


# Optional: Logging SQL statements
spring.jpa.show-sql=true
#no use of localhost docker con./mvnw clean package -DskipTests
# tainer service name

eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/